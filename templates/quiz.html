<!DOCTYPE html>
<html>
<head>
<title>Ikigai Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins;
background:#f4f4f4;
display:flex;
justify-content:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:500px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{text-align:center;margin-bottom:20px}

label{font-weight:bold}

select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#ffb347;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Ikigai Career Quiz</h2>

<form action="/submit" method="POST">

<!-- DEMOGRAPHIC -->
<label>Age</label>
<select name="age">
<option>16-18</option>
<option>18-20</option>
</select>

<label>Gender</label>
<select name="gender">
<option>Female</option>
<option>Male</option>
<option>Other</option>
</select>

<label>Study Stream</label>
<select name="stream">
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
</select>

<!-- IKIGAI -->

<label>What do you love?</label>
<select name="love">
<option>Technology</option>
<option>Art & Creativity</option>
<option>Helping People</option>
<option>Business</option>
</select>

<label>What are you good at?</label>
<select name="skill">
<option>Problem Solving</option>
<option>Communication</option>
<option>Design</option>
<option>Leadership</option>
</select>

<label>What does the world need?</label>
<select name="mission">
<option>Education</option>
<option>Healthcare</option>
<option>Innovation</option>
<option>Environment</option>
</select>

<label>What can you be paid for?</label>
<select name="money">
<option>Coding</option>
<option>Teaching</option>
<option>Marketing</option>
<option>Designing</option>
</select>

<button type="submit">Get Result</button>

</form>

</div>

</body>
</html>
