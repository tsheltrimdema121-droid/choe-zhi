<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */
body{
background:url('/static/images/hero.jpg') center/cover no-repeat;
height:100vh;
}

/* OVERLAY */
.overlay{
background:rgba(0,0,0,0.7);
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

/* TITLE */
.text-box{
color:white;
margin-bottom:20px;
text-align:center;
}

.text-box h2{
font-size:32px;
}

/* DASHBOARD FRAME */
.dashboard-container{
width:90%;
max-width:1000px;
height:500px;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.dashboard-container iframe{
width:100%;
height:100%;
border:none;
}

/* BUTTON */
button{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:8px;
background:#ffb347;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ffa726;
}
</style>

</head>

<body>

<div class="overlay">

<div class="text-box">
<h2>Career Insights Dashboard</h2>
<p style="color:#ddd;">
This dashboard visualizes student responses collected through the career guidance system.
</p>
</div>

<div class="dashboard-container">
<iframe 
src="https://public.tableau.com/views/SurvayStoryPoint/Story1?:embed=true">
</iframe>
</div>

<div>
<a href="/"><button>Home</button></a>
</div>

</div>

</body>
</html>
